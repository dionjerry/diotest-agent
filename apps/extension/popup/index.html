<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DioTest Launcher</title>
    <style>
      body { margin: 0; background: #0f172a; color: #e2e8f0; font-family: ui-sans-serif, system-ui; }
      .wrap { width: 280px; padding: 12px; display: grid; gap: 10px; }
      .title { font-size: 16px; font-weight: 700; margin: 0; }
      .sub { margin: 0; font-size: 12px; color: #94a3b8; }
      button { border: 1px solid #334155; border-radius: 8px; background: #1e293b; color: #e2e8f0; padding: 9px 10px; text-align: left; cursor: pointer; }
      button:hover { background: #243449; }
      .primary { background: #2563eb; border-color: #2563eb; color: #fff; }
      .primary:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="title">DioTest</p>
      <p class="sub">Open full workspace in Side Panel.</p>
      <button id="open" class="primary">Open DioTest Panel</button>
      <button id="analyze">Run Analyze</button>
      <button id="settings">Open Settings</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
